async function apiFetch(path, options = {}){

  const opts = {
    credentials: "include",
    ...options
  };

  opts.headers = {
    ...(options.headers || {})
  };

  if(session){
    opts.headers.Authorization = "Bearer " + session;
  }

  const res = await fetch(API + path, opts);

  if(res.status === 401){
    sessionStorage.removeItem("auth_session");
    session = null;

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("profileBox").classList.add("hidden");
    document.getElementById("authBox").classList.remove("hidden");
  }

  return res;
}

const commodityIds = translationMap;
function buildInaraUrl(overrides, claim) {
	const baseParams = {
	  formbrief: "1",
	  pi1: "1",
	  pi10: "3",
	  pi11: "0",
	  pi3: "3",
	  pi9: "0",
	  pi5: "0",
	  pi12: "0",
	  pi7: "10000",
	  pi14: "0",
	  ps3: "",
	  ps1: claim.StarSystem
	};
	const variants = [
	  { pi4: "0" },
	  { pi4: "1" }
	];
  const params = new URLSearchParams({
    ...baseParams,
    ...overrides
  });

  const commodities = top5
    .map(x => commodityIds[x.key])
    .filter(Boolean)
    .map(id => `&pa1%5B%5D=${id}`)
    .join("");

  return `https://inara.cz/elite/commodities/?${params.toString()}${commodities}`;
}
async function getnextsys(url) {
	try {
		const response = await fetch(
			`https://my.alfa-bgs.workers.dev/?url=${encodeURIComponent(url)}`
		);

		if (!response.ok) {
			throw new Error(`HTTP ${response.status}`);
		}

		const html = await response.text();

		const parser = new DOMParser();
		const doc = parser.parseFromString(html, "text/html");

		const firstRow = doc.querySelector(
			"table.tablesortercollapsed tbody tr, table.tablesorter tbody tr"
		);

		if (!firstRow) return "None";

		const firstCell = firstRow.querySelector("td.wrap, th.wrap");

		return firstCell ? firstCell.textContent.trim().replace(/[︎]/g, "").replace(/[]/g, "") : "None";

	} catch (error) {
		console.error("getnextsys error:", error);
		return "None";
	}
}
function normKey(str) {
	return (str || "")
		.toLowerCase()
		.replace(/[\s_-]+/g, "");
}
let oldtop5 = [];
let top5 = [];
let oldsystem = [];
let activenext1 = false;
let activenext2 = false;
async function buildClaimTables(claims, shipCargo, fcCargo, Market) {

  const shipMap = new Map(
    shipCargo.map(i => [
      normKey(i.Type),
      i.Count
    ])
  );

  const marketMap = new Map(
    Market.map(i => [
      normKey(i.Type),
      i.Count
    ])
  );
	const marketTotals = new Map();
	let nextsys = true;
	for (const claim of claims) {
		for (const station of (claim.DockedStations || [])) {
			for (const need of (station.ResourcesRequired || [])) {
				const key = normKey(need.Name_Localised);
				if (!marketTotals.has(key)) {
					marketTotals.set(key, {
						name: need.Name_Localised,
						required: 0,
						provided: 0
					});
				}
				const item = marketTotals.get(key);
				item.required += need.RequiredAmount || 0;
				item.provided += need.ProvidedAmount || 0;
				const marketAmount = marketMap.get(key) || 0;
				const ship = shipMap.get(key) || 0;
				const fc = fcCargo.get(key) || 0;
				const missing =
					item.required -
					item.provided -
					ship -
					fc;
				if (missing > 0 && marketAmount > 0) {nextsys = false;}
			}
		}
	}
	// sprawdzenie czy poprzednie top5 zostało ukończone
	let oldTop5Completed = true;

	if (oldtop5.length > 0) {
		for (const oldItem of oldtop5) {

			const current = marketTotals.get(oldItem.key);

			// jeśli towar już nie występuje w wymaganiach,
			// uznajemy go za ukończony
			if (!current) {
				continue;
			}

			const marketAmount = marketMap.get(oldItem.key) || 0;
			const ship = shipMap.get(oldItem.key) || 0;
			const fc = fcCargo.get(oldItem.key) || 0;

			const missing =
				current.required -
				current.provided -
				ship -
				fc;

			if (missing > 0 && marketAmount > 0) {
				oldTop5Completed = false;
				break;
			}
		}
	}

	// nowe top5 budujemy tylko gdy:
	// 1. nie ma już braków w obecnym systemie (nextsys)
	// 2. poprzednie top5 zostało całkowicie dowiezione
	if (nextsys === true && oldTop5Completed && !activenext1) {
		activenext1 = true;
		oldtop5 = [...top5];

		top5 = [...marketTotals.entries()]
			.map(([key, item]) => {
				const fcAmount = fcCargo.get(key) || 0;
				const shipAmount = shipMap.get(key) || 0;

				const demand =
					(item.required || 0) -
					(item.provided || 0) -
					fcAmount -
					shipAmount;

				return {
					key,
					name: item.name,
					demand
				};
			})
			.filter(x => x.demand > 0)
			.sort((a, b) => b.demand - a.demand)
			.slice(0, 5);
		oldsystem = [];
		activenext1 = false;
	}

  const container = document.createElement("div");

  // =====================================
  // SUMY DLA CAŁEGO SYSTEMU
  // =====================================
  let oldsys = "none";
  const systemTotals = new Map();
  for (const claim of claims) {
	if (nextsys === true && oldTop5Completed && !activenext2 && oldsys !== claim.StarSystem && top5.length !== 0) {
		activenext2 = true;
		const urls = [
		  {
			url: buildInaraUrl({ pi4: "0" }, claim),
			type: "starport"
		  },
		  {
			url: buildInaraUrl({ pi4: "1" }, claim),
			type: "surface port"
		  }
		];

		for (const item of urls) {

		  const resulttext = await getnextsys(item.url);

		  if (!resulttext) continue;

		  const [station, system] = resulttext
			.split("|")
			.map(x => x.trim());

		  const NextSystemName =
			`Jump to <a style="color: #4cd137;">${system}</a><a>, target ${item.type}</a><a style="color: #4cd137;"> ${station}</a>`;

		  const ForSystemName = claim.StarSystem;

		  oldsystem.push({
			NextSystemName,
			ForSystemName
		  });

		  console.log("log", oldsystem);

		  break;
		}
		
		activenext2 = false;
	}
	oldsys = claim.StarSystem;

    const systemKey = claim.StarSystem;

    if (!systemTotals.has(systemKey)) {
      systemTotals.set(systemKey, new Map());
    }

    const totals = systemTotals.get(systemKey);

    for (const station of (claim.DockedStations || [])) {

      for (const need of (station.ResourcesRequired || [])) {

        const key = normKey(need.Name_Localised);

        if (!totals.has(key)) {
          totals.set(key, {
            Type: need.Name_Localised,
            RequiredAmount: 0,
            ProvidedAmount: 0
          });
        }

        const material = totals.get(key);

        material.RequiredAmount += need.RequiredAmount || 0;
        material.ProvidedAmount += need.ProvidedAmount || 0;
      }
    }
  }

  // =====================================
  // TABELA DLA KAŻDEJ STACJI
  // =====================================

  for (const claim of claims) {

    const totals = systemTotals.get(claim.StarSystem);

	const systitle = document.createElement("h2");
	systitle.textContent =
		`${claim.StarSystem}`;


     container.appendChild(systitle);
    for (const station of (claim.DockedStations || [])) {

      const stationDiv = document.createElement("div");
      stationDiv.style.marginBottom = "25px";

      const title = document.createElement("h2");
      title.textContent =
        `${station.StationName}`;

      stationDiv.appendChild(title);

      const table = document.createElement("table");
      table.border = "1";

      table.innerHTML = `
        <thead>
          <tr>
            <th>Type</th>
            <th>Ship</th>
            <th>Fleet Carrier</th>
            <th>Missing</th>
            <th>Station</th>
            <th>System</th>
            <th>Market</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      const tbody = table.querySelector("tbody");

      for (const need of (station.ResourcesRequired || [])) {

        const key = normKey(need.Name_Localised);

        const ship = shipMap.get(key) || 0;
        const fc = fcCargo.get(key) || 0;
        const market = marketMap.get(key) || 0;

        const totalSystem =
          totals.get(key)?.RequiredAmount || 0;

        const totalProvided =
          totals.get(key)?.ProvidedAmount || 0;

        const missing =
          totalSystem -
          totalProvided -
          ship -
          fc;

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${need.Name_Localised}</td>
          <td>${ship}</td>
          <td>${fc}</td>
          <td>${Math.max(0, missing)}</td>
          <td>${need.RequiredAmount}</td>
          <td>${totalSystem}</td>
          <td>${market}</td>
        `;

        tbody.appendChild(row);
      }

      stationDiv.appendChild(table);
      container.appendChild(stationDiv);
    }
  }

  ws.send(JSON.stringify({
    type: "TABLE_UPDATE",
    data: {
      colonisationClaims: claims,
      shipcargo: Array.from(shipMap.entries()),
      fcCargo: Array.from(fcCargo.entries()),
      Market: Array.from(marketMap.entries()),
	  NextSystems: oldsystem
    },
    event: "table",
  }));
  return container;
}

async function render() {
  const tabledata =  await buildClaimTables(
    state.colonisationClaims,
    state.shipcargo,
    state.fcCargo,
    state.Market
  );
  const profileBox = document.getElementById("profileBox");
  profileBox.replaceChildren(tabledata);

async function requestRender() {
  if (renderQueued) return;

  renderQueued = true;

	requestAnimationFrame(async () => {
	  renderQueued = false;
	  await render();
	});
}
let oldCargo = [];
let localCargo = [];
let mapCargo = [];
function toMap(arr) {
  const map = new Map();
  for (const item of arr) {
	const localtype = normKey(item.commodity);
    map.set(localtype, (map.get(localtype) || 0) + item.qty);
  }
  return map;
}
function applyDiff(type, diff) {
  const map = new Map(localCargo.map(i => [i.Type, i.Count]));
  const current = map.get(type) || 0;
  const next = current + diff;

  if (next === 0) {
    map.delete(type);
  } else {
    map.set(type, next);
  }

  localCargo = [...map.entries()].map(([Type, Count]) => ({
    Type,
    Count
  }));
}
function mergeMaps(base, diff) {
  const result = new Map(base);

  for (const [key, value] of diff.entries()) {
    result.set(key, (result.get(key) || 0) + value);
  }

  return result;
}
ws.onmessage = async (msg) => {

  const packet = JSON.parse(msg.data);

  // ====================================
  // LIVE STATE UPDATE
  // ====================================
	if (packet.type === "LIVE_DATA") {
	  const data = packet.data ?? {};

	  state.colonisationClaims = data.colonisationClaims;

	  state.shipcargo = data.shipcargo ?? [];
	  state.Market = (data.Market ?? []).map(r => ({
		  Type: r.Type,
		  Count: r.Stock
		}));
	  let CargoTransferEvent = false
	  if (packet.event === "CargoTransfer" || packet.event === "CargoTransferBatch" || packet.event === "Cargo" || packet.event === "ColonisationContribution") {
		CargoTransferEvent = true
	  }
	  if (!CargoTransferEvent){
	    await requestRender();
	  }
	}

  // ====================================
  // EVENT IMPULSE
  // ====================================

	if (
	  (packet.type === "EVENT" && packet.event === "CargoTransfer") ||
	  (packet.type === "EVENT" && packet.event === "CargoTransferBatch")
	) {

	  document.getElementById("dashStatus").innerText =
		"Refreshing Frontier data...";

	  try {
		const res = await apiFetch("/data");

		if (!res.ok) {
		  document.getElementById("dashStatus").innerText =
			"Worker fetch failed";
		  return;
		}

		const workerData = await res.json();

		document.getElementById("dashStatus").innerText =
		  "Frontier updated ✔";

		const cargo = workerData.cargo ?? [];
		// ==============================
		// 1. MAPA AKTUALNA I POPRZEDNIA
		// ==============================
		// ==============================
		// 3. TRANSFERS (REAL-TIME SYMULACJA)
		// ==============================
		if (packet.event === "CargoTransfer") {
		  const transfers = packet?.data2?.Transfers;

		  if (Array.isArray(transfers)) {
			for (const t of transfers) {

			  if (!t?.Type || typeof t.Count !== "number") continue;

			  if (t.Direction === "tocarrier") {
				applyDiff(t.Type, +t.Count);
			  }

			  if (t.Direction === "toship") {
				applyDiff(t.Type, -t.Count);
			  }
			}
		  }
		}
		if (oldCargo.length > 0) {
			const newMap = toMap(cargo);
			const oldMap = toMap(oldCargo);
			// ==============================
			// 2. RÓŻNICE BACKEND vs OLD
			// ==============================
			const allTypes = new Set([
			  ...newMap.keys(),
			  ...oldMap.keys()
			]);
			for (const type of allTypes) {
			  const diff = (newMap.get(type) || 0) - (oldMap.get(type) || 0);
			  if (diff > 0) {
				applyDiff(type, -diff);
			  } else if (diff < 0) {
				applyDiff(type, -diff); // bo diff jest ujemny
			  }
			}
		}
		// ==============================
		// 4. UPDATE OLD SNAPSHOT
		// ==============================
		oldCargo = cargo;

		// ==============================
		// 5. UI
		// ==============================

		const fcMap = new Map();

		for (const item of cargo) {
		  const key = normKey(item.locName);
		  fcMap.set(key, (fcMap.get(key) || 0) + item.qty);
		}
		state.localMap = new Map(
		  localCargo.map(i => [
			normKey(i.Type),
			i.Count
		  ])
		);
		state.fcCargo = mergeMaps(fcMap, state.localMap);
		
		await requestRender();

	  } catch (err) {
		console.error(err);
		document.getElementById("dashStatus").innerText =
		  "Worker offline";
	  }
	}
};
 

// ================= INIT =================
async function init(){

  session = sessionStorage.getItem("auth_session");

  if(!session) return;

  await loadDashboard();
}

// ================= DASHBOARD =================
async function loadDashboard(){

  const res = await apiFetch("/me");
  if(!res.ok) return false;

  const data = await res.json();

  if(!data.logged) return false;

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("profileBox").classList.remove("hidden");

  document.getElementById("userEmail").innerText =
    "Logged as: " + data.email;

  document.getElementById("frontierStatus").innerText =
    data.frontier
      ? "Frontier: CONNECTED ✔"
      : "Frontier: NOT CONNECTED ✖";

  return data;
}

// ================= PROFILE (ONLY JSON) =================
async function loadProfile(){

  try{

    const res = await apiFetch("/data");
    if(!res.ok) return;

    const data = await res.json();

    document.getElementById("profileUI").innerText =
      JSON.stringify(data, null, 2);

  }catch(err){
    console.error(err);
  }
}


// ================= AUTH =================

async function login(){

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const res = await apiFetch("/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.error){
    document.getElementById("authStatus").innerText = data.error;
    return;
  }

  sessionStorage.setItem("auth_session", data.session);
  session = data.session;

  await loadDashboard();
}


// ================= LOGOUT =================
async function logout(){
  await apiFetch("/logout",{ method:"POST" });
  location.reload();
}



init();
